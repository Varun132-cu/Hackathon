<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">DebtAssist live voice workflow</title>
  <desc id="desc">A workflow showing the dashboard, Twilio, the context-aware voice bridge, OpenAI Realtime, and the logged outcome.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#17362e"/><stop offset="1" stop-color="#284b3d"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0a1f19" flood-opacity=".28"/></filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0L8 4.5 0 9z" fill="#f3bc81"/></marker>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="1040" cy="58" r="128" fill="#d6e6cf" opacity=".08"/>
  <circle cx="112" cy="372" r="160" fill="#e2684d" opacity=".1"/>
  <text x="70" y="78" fill="#f8f4eb" font-family="Arial, sans-serif" font-size="30" font-weight="700">A considerate conversation, end to end.</text>
  <text x="70" y="108" fill="#bfd0c6" font-family="Arial, sans-serif" font-size="16">Consent-led profile context travels with every synthetic test call.</text>
  <g fill="none" stroke="#f3bc81" stroke-width="3" marker-end="url(#arrow)">
    <path d="M270 240H350"/><path d="M510 240H590"/><path d="M750 240H830"/><path d="M990 240H1060"/>
  </g>
  <g filter="url(#shadow)" font-family="Arial, sans-serif">
    <g transform="translate(70 170)"><rect width="200" height="142" rx="16" fill="#fffdf8"/><rect width="200" height="7" rx="3.5" fill="#e2684d"/><text x="22" y="48" fill="#1c2e27" font-size="18" font-weight="700">Dashboard</text><text x="22" y="76" fill="#627067" font-size="13">Profile • consent • queue</text><text x="22" y="101" fill="#627067" font-size="13">Call log • transcript</text><circle cx="166" cy="112" r="17" fill="#dfe9d9"/><path d="M159 112l5 5 10-12" fill="none" stroke="#496a48" stroke-width="3"/></g>
    <g transform="translate(350 170)"><rect width="160" height="142" rx="16" fill="#fffdf8"/><rect width="160" height="7" rx="3.5" fill="#f3bc81"/><text x="22" y="48" fill="#1c2e27" font-size="18" font-weight="700">Twilio</text><text x="22" y="76" fill="#627067" font-size="13">Outbound call</text><text x="22" y="101" fill="#627067" font-size="13">Media Stream</text><path d="M122 108c7-17 14 17 21 0s14 17 21 0" fill="none" stroke="#e2684d" stroke-width="3"/></g>
    <g transform="translate(590 150)"><rect width="160" height="182" rx="16" fill="#e9f0e5"/><rect width="160" height="7" rx="3.5" fill="#7ca36d"/><text x="22" y="49" fill="#1c2e27" font-size="18" font-weight="700">Voice bridge</text><text x="22" y="78" fill="#405847" font-size="13">Identity check</text><text x="22" y="101" fill="#405847" font-size="13">Context &amp; guardrails</text><text x="22" y="124" fill="#405847" font-size="13">Turn-taking</text><rect x="22" y="143" width="116" height="20" rx="10" fill="#d1e0c9"/><text x="34" y="158" fill="#496a48" font-size="10" font-weight="700">SYNTHETIC ONLY</text></g>
    <g transform="translate(830 170)"><rect width="160" height="142" rx="16" fill="#fffdf8"/><rect width="160" height="7" rx="3.5" fill="#b1caa0"/><text x="22" y="48" fill="#1c2e27" font-size="18" font-weight="700">Realtime AI</text><text x="22" y="76" fill="#627067" font-size="13">Speech to speech</text><text x="22" y="101" fill="#627067" font-size="13">English dialogue</text><circle cx="128" cy="112" r="17" fill="#dfe9d9"/><path d="M119 112h18M128 103v18" stroke="#496a48" stroke-width="3"/></g>
    <g transform="translate(1060 170)"><rect width="100" height="142" rx="16" fill="#fffdf8"/><rect width="100" height="7" rx="3.5" fill="#e2684d"/><text x="18" y="48" fill="#1c2e27" font-size="16" font-weight="700">Record</text><text x="18" y="76" fill="#627067" font-size="12">Outcome</text><text x="18" y="98" fill="#627067" font-size="12">Escalation</text><text x="18" y="120" fill="#627067" font-size="12">Audit</text></g>
  </g>
</svg>
